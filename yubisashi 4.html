<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="指さし" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#e8f4ff" />
  <meta name="format-detection" content="telephone=no" />
  <title>指さしコミュニケーション</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; touch-action: manipulation;
    }

    :root {
      --bg:           #e8f4ff;
      --surface:      #ffffff;
      --accent:       #1d6fea;
      --accent-dark:  #1354c2;
      --accent-light: #dbeafe;
      --text:         #0f2d5e;
      --muted:        #5a7fa8;
      --border:       #93c5fd;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'ヒラギノ角ゴシック',
                   -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(29,111,234,.16) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(56,189,248,.12) 0%, transparent 50%);
    }

    #app {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      padding-top:    env(safe-area-inset-top,    0px);
      padding-right:  env(safe-area-inset-right,  0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left:   env(safe-area-inset-left,   0px);
    }

    /* ── 画面共通 ── */
    .screen {
      display: none;
      position: absolute; inset: 0;
      flex-direction: column;
      animation: fadeIn .15s ease;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.98); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━
       画面①　母音選択
       ボタンが画面全体を占有
    ━━━━━━━━━━━━━━━━━━━━━━ */
    #screen-vowels {
      padding: 1rem;
      gap: 0.6rem;
      align-items: stretch;
    }

    .title {
      flex-shrink: 0;
      text-align: center;
      font-size: clamp(.9rem, 2vmin, 1.3rem);
      letter-spacing: .3em;
      color: var(--muted);
    }

    /* flex:1 で残りの高さをすべて使う */
    .vowel-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: 1fr;          /* 1行が全高を占有 */
      gap: clamp(10px, 2.5vmin, 24px);
    }

    .btn-vowel {
      border-radius: clamp(16px, 3vmin, 32px);
      border: 3px solid var(--border);
      background: var(--surface);
      color: var(--accent);
      font-size: clamp(4rem, 16vmin, 12rem);   /* 超大文字 */
      font-family: inherit; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(29,111,234,.14);
      transition: transform .1s, background .1s, color .1s;
    }
    .btn-vowel:active {
      transform: scale(.95);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 40px rgba(29,111,234,.5);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━
       画面②　文字選択
    ━━━━━━━━━━━━━━━━━━━━━━ */
    #screen-consonants {
      padding: 0.7rem 0.8rem;
      gap: clamp(4px, 1vmin, 8px);
      align-items: stretch;
    }

    .consonant-header {
      flex-shrink: 0;
      display: flex; align-items: center;
      gap: 0.5rem;
      padding-bottom: clamp(4px, 1vmin, 8px);
    }

    .btn-back {
      flex-shrink: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--accent);
      font-family: inherit; font-weight: 700;
      font-size: clamp(1rem, 2.5vmin, 1.5rem);
      padding: clamp(.5rem, 1.5vmin, .9rem) clamp(1rem, 2.5vmin, 1.8rem);
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      transition: background .12s;
    }
    .btn-back:active { background: var(--accent-light); }

    .row-label {
      flex: 1; text-align: center;
      font-size: clamp(1.6rem, 4.5vmin, 3rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .2em;
    }

    /* メイン：5列×2行、縦3/5を占有 */
    .consonant-grid {
      flex: 3;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: clamp(8px, 1.8vmin, 18px);
    }

    .btn-char {
      border-radius: clamp(12px, 2.5vmin, 26px);
      border: 2.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: clamp(2.2rem, 10vmin, 7rem);
      font-family: inherit; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.07);
      transition: transform .1s, background .1s, color .1s;
    }
    .btn-char:active {
      transform: scale(.93);
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 28px rgba(29,111,234,.4);
    }

    /* 濁音・半濁音・ん：縦2/5を占有 */
    .extra-section {
      flex: 2;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .extra-divider {
      flex-shrink: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: clamp(4px, 1vmin, 8px) 0;
    }

    .extra-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 1fr;
      gap: clamp(8px, 1.8vmin, 18px);
    }

    .btn-extra {
      border-radius: clamp(10px, 2vmin, 22px);
      border: 2.5px solid #fbbf24;
      background: #fffbeb;
      color: #92400e;
      font-size: clamp(2rem, 9vmin, 6rem);
      font-family: inherit; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.06);
      transition: transform .1s, background .1s, color .1s;
    }
    .btn-extra:active {
      transform: scale(.93);
      background: #f59e0b;
      color: #fff;
    }

    .btn-n {
      border-color: #4ade80;
      background: #f0fdf4;
      color: #14532d;
    }
    .btn-n:active { background: #22c55e; color: #fff; }

    /* ━━━━━━━━━━━━━━━━━━━━━━
       画面③　選択文字表示
    ━━━━━━━━━━━━━━━━━━━━━━ */
    #screen-selected {
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 4vh, 3rem);
    }

    .big-char {
      font-size: clamp(12rem, 50vmin, 30rem);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
      filter: drop-shadow(0 4px 40px rgba(29,111,234,.3));
    }

    .btn-home {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: clamp(1.1rem, 3vmin, 1.8rem);
      font-weight: 700;
      padding: clamp(.9rem, 2.5vmin, 1.4rem) clamp(2.5rem, 7vmin, 4.5rem);
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(29,111,234,.35);
      transition: background .12s, transform .1s;
    }
    .btn-home:active {
      background: var(--accent-dark);
      transform: scale(.96);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ① 母音選択 -->
  <div id="screen-vowels" class="screen active">
    <p class="title">母音を選んでください</p>
    <div class="vowel-grid" id="vowel-grid"></div>
  </div>

  <!-- ② 文字選択 -->
  <div id="screen-consonants" class="screen">
    <div class="consonant-header">
      <button class="btn-back" id="btn-back">← もどる</button>
      <span class="row-label" id="row-label"></span>
      <div style="flex-shrink:0;width:80px"></div>
    </div>
    <div class="consonant-grid" id="consonant-grid"></div>
    <div class="extra-section">
      <div class="extra-divider"></div>
      <div class="extra-grid" id="extra-grid"></div>
    </div>
  </div>

  <!-- ③ 選択文字表示 -->
  <div id="screen-selected" class="screen">
    <div class="big-char" id="big-char"></div>
    <button class="btn-home" id="btn-home">はじめにもどる</button>
  </div>

</div>
<script>
  const syllabary = {
    'あ': { main: ['あ','か','さ','た','な','は','ま','や','ら','わ'], extra: ['が','ざ','だ','ば','ぱ'] },
    'い': { main: ['い','き','し','ち','に','ひ','み','り'],           extra: ['ぎ','じ','ぢ','び','ぴ'] },
    'う': { main: ['う','く','す','つ','ぬ','ふ','む','ゆ','る'],      extra: ['ぐ','ず','づ','ぶ','ぷ'] },
    'え': { main: ['え','け','せ','て','ね','へ','め','れ'],           extra: ['げ','ぜ','で','べ','ぺ'] },
    'お': { main: ['お','こ','そ','と','の','ほ','も','よ','ろ','を'], extra: ['ご','ぞ','ど','ぼ','ぽ'] },
  };

  // iOS Safari: touchstart 登録で :active CSS を有効化
  document.addEventListener('touchstart', () => {}, { passive: true });

  // touchend で即時反応・click の二重発火防止
  function onTap(el, fn) {
    el.addEventListener('touchend', e => { e.preventDefault(); fn(); }, { passive: false });
    el.addEventListener('click', fn);
  }

  onTap(document.getElementById('btn-back'), () => showVowels());
  onTap(document.getElementById('btn-home'), () => showVowels());

  // 母音ボタン生成
  const vowelGrid = document.getElementById('vowel-grid');
  for (const vowel of Object.keys(syllabary)) {
    const btn = document.createElement('button');
    btn.className = 'btn-vowel';
    btn.textContent = vowel;
    onTap(btn, () => onVowelClick(vowel));
    vowelGrid.appendChild(btn);
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showVowels() { showScreen('screen-vowels'); }

  function onVowelClick(vowel) {
    const { main, extra } = syllabary[vowel];
    document.getElementById('row-label').textContent = vowel + ' 行';

    const mainGrid = document.getElementById('consonant-grid');
    mainGrid.innerHTML = '';
    for (const c of main) mainGrid.appendChild(makeBtn(c, 'btn-char'));

    const extraGrid = document.getElementById('extra-grid');
    extraGrid.innerHTML = '';
    for (const c of extra) extraGrid.appendChild(makeBtn(c, 'btn-extra'));
    extraGrid.appendChild(makeBtn('ん', 'btn-extra btn-n'));

    showScreen('screen-consonants');
  }

  function makeBtn(c, cls) {
    const btn = document.createElement('button');
    btn.className = cls;
    btn.textContent = c;
    onTap(btn, () => showChar(c));
    return btn;
  }

  function showChar(c) {
    document.getElementById('big-char').textContent = c;
    showScreen('screen-selected');
    speak(c);
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    utter.rate = 0.85;
    utter.pitch = 1.1;
    speechSynthesis.speak(utter);
  }
</script>
</body>
</html>
